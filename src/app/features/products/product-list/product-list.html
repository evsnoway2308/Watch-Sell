<div class="product-list-container">
    <div class="list-header">
        <h1 class="category-title">{{ categoryName }}</h1>
        <p class="product-count">{{ totalElements }} sản phẩm</p>
    </div>

    <div class="shop-layout">
        <!-- Sidebar Filters -->
        <aside class="shop-sidebar">
            <div class="filter-group">
                <h3>Bộ lọc</h3>
            </div>
            
            <div class="filter-section">
                <h4>Loại máy</h4>
                <label class="custom-checkbox"><input type="checkbox"> <span>Cơ tự động (Automatic)</span></label>
                <label class="custom-checkbox"><input type="checkbox"> <span>Quartz (Pin)</span></label>
                <label class="custom-checkbox"><input type="checkbox"> <span>Smartwatch</span></label>
            </div>
            
            <div class="filter-section">
                <h4>Chất liệu dây</h4>
                <label class="custom-checkbox"><input type="checkbox"> <span>Dây da</span></label>
                <label class="custom-checkbox"><input type="checkbox"> <span>Thép không gỉ</span></label>
                <label class="custom-checkbox"><input type="checkbox"> <span>Titanium</span></label>
            </div>

            <div class="filter-section">
                <h4>Kích thước mặt</h4>
                <label class="custom-checkbox"><input type="checkbox"> <span>Dưới 38mm</span></label>
                <label class="custom-checkbox"><input type="checkbox"> <span>Từ 38mm - 42mm</span></label>
                <label class="custom-checkbox"><input type="checkbox"> <span>Trên 42mm</span></label>
            </div>

            <div class="filter-section">
                <h4>Độ chống nước</h4>
                <label class="custom-checkbox"><input type="checkbox"> <span>3 ATM</span></label>
                <label class="custom-checkbox"><input type="checkbox"> <span>5 ATM</span></label>
                <label class="custom-checkbox"><input type="checkbox"> <span>Từ 10 ATM</span></label>
            </div>
        </aside>

        <!-- Product Grid -->
        <div class="shop-main">
            <!-- Loading State -->
            <div *ngIf="isLoading" class="loading-state">
                <div class="spinner"></div>
            </div>

            <div *ngIf="!isLoading && products.length > 0" class="product-grid">
                <div *ngFor="let product of products" class="product-card">
                    <div class="product-image">
                        <img [src]="product.imageUrl || 'assets/placeholder-product.png'" [alt]="product.name" loading="lazy">
                        <div *ngIf="!product.available || product.stock === 0" class="badge out-of-stock">Hết hàng</div>
                        <div class="hover-overlay">
                            <a [routerLink]="['/products', product.id]" class="btn-outline quick-view-btn">Chi tiết</a>
                            <button class="btn-primary quick-add-btn" [disabled]="!product.available || product.stock === 0" (click)="addToCart($event, product)">Thêm vào giỏ</button>
                        </div>
                    </div>
                    <div class="product-info">
                        <h3 class="name" [title]="product.name">{{ product.name }}</h3>
                        <span class="category">{{ product.categoryName }}</span>
                        <div class="price">{{ product.price | currency:'VND':'symbol':'1.0-0' }}</div>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div *ngIf="!isLoading && products.length === 0" class="empty-state">
                <p>Không tìm thấy sản phẩm nào.</p>
            </div>

            <!-- Pagination -->
            <div *ngIf="totalPages > 1" class="pagination">
                <button class="page-btn" [disabled]="currentPage === 0" (click)="onPageChange(currentPage - 1)">
                    <i class="fas fa-chevron-left"></i>
                </button>

                <div class="page-numbers">
                    <button *ngFor="let page of getPages()" class="page-number" [class.active]="page === currentPage"
                        (click)="onPageChange(page)">
                        {{ page + 1 }}
                    </button>
                </div>

                <button class="page-btn" [disabled]="currentPage === totalPages - 1"
                    (click)="onPageChange(currentPage + 1)">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>
</div>
