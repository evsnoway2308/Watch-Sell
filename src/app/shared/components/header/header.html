<header class="header">
  <div class="header-container">
    <!-- Logo -->
    <a routerLink="/" class="logo">
      <span style="font-family: var(--font-serif); letter-spacing: 3px; font-weight: 700;">K-HWATCH<span style="color: var(--accent-gold);">.</span></span>
    </a>
    <!-- Search Bar -->
    <div class="search-bar">
      <input type="text" #searchInput placeholder="Tìm kiếm sản phẩm..." (keyup.enter)="onSearch(searchInput.value)">
      <button (click)="onSearch(searchInput.value)"><i class="fas fa-search"></i></button>
    </div>

    <!-- Actions -->
    <div class="header-actions">
      <!-- Cart -->
      <a routerLink="/cart" class="action-btn">
        <div class="icon-wrapper">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-badge" *ngIf="cartService.itemCount() > 0">
            {{ cartService.itemCount() }}
          </span>
        </div>
      </a>

      <!-- User Account -->
      <div class="user-account-v2" *ngIf="isLoggedIn; else loginParams">
        <div class="user-dropdown">
          <div class="user-info-link">
            <div class="avatar-container">
              <!-- Avatar placeholder if no avatar -->
              <i class="fas fa-user-circle" *ngIf="!user()?.avatar" style="font-size: 32px; color: #94a3b8;"></i>
              <img [src]="user()?.avatar" *ngIf="user()?.avatar" alt="Avatar" class="user-avatar-img">
            </div>
            <div class="user-details-box">
              <span class="member-badge">{{ getRoleDisplayName(user()?.role) }}</span>
              <span class="user-display-name" *ngIf="!user()" style="font-size: 0.8rem; font-weight: normal;">Đang
                tải...</span>
              <span class="user-display-name" *ngIf="user()"
                [title]="user()?.fullName || user()?.name || user()?.username">{{ user()?.fullName || user()?.name ||
                user()?.username
                }}</span>
            </div>
            <i class="fas fa-chevron-down dropdown-arrow"></i>
          </div>

          <div class="dropdown-menu">
            <a routerLink="/profile" class="dropdown-item">
              <i class="fas fa-user-edit"></i>
              <span>Hồ sơ của tôi</span>
            </a>
            <a routerLink="/orders" class="dropdown-item">
              <i class="fas fa-box-open"></i>
              <span>Lịch sử đơn hàng</span>
            </a>
            <a routerLink="/admin" class="dropdown-item" *ngIf="isAdmin">
              <i class="fas fa-user-shield"></i>
              <span>Trang quản trị</span>
            </a>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item logout-item" (click)="logout()">
              <i class="fas fa-sign-out-alt"></i>
              <span>Đăng xuất</span>
            </button>
          </div>
        </div>
      </div>

      <ng-template #loginParams>
        <a routerLink="/login" class="action-btn login-btn">
          <span>Đăng nhập</span>
        </a>
      </ng-template>

    </div>
  </div>

  <!-- Category Navigation -->
  <nav class="category-nav">
    <div class="category-container">
      <a routerLink="/products" class="category-link" routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: true}">
        <i class="fas fa-th-large"></i>
        <span>Tất cả</span>
      </a>
      <a *ngFor="let cat of categories()" [routerLink]="['/products']" [queryParams]="{category: cat.id}"
        class="category-link" routerLinkActive="active">
        <span>{{ cat.name }}</span>
      </a>
    </div>
  </nav>
</header>
