<header class="header">
  <div class="header-container">
    <!-- Logo -->
    <a routerLink="/" class="logo">
      <i class="fas fa-store text-danger"></i>
      <span>Watch<span class="text-danger"></span></span>
    </a>

    <!-- Search Bar -->
    <div class="search-bar">
      <input type="text" placeholder="Tìm kiếm sản phẩm...">
      <button><i class="fas fa-search"></i></button>
    </div>

    <!-- Actions -->
    <div class="header-actions">
      <!-- Cart -->
      <a href="javascript:void(0)" class="action-btn">
        <div class="icon-wrapper">
          <i class="fas fa-shopping-cart"></i>
        </div>
      </a>

      <!-- User Account -->
      <div class="user-account-v2" *ngIf="isLoggedIn; else loginParams">
        <div class="avatar-container">
          <!-- Avatar placeholder if no avatar -->
          <i class="fas fa-user-circle" *ngIf="!user()?.avatar" style="font-size: 40px; color: #94a3b8;"></i>
          <img [src]="user()?.avatar" *ngIf="user()?.avatar" alt="Avatar" class="user-avatar-img">
        </div>
        <div class="user-details-box">
          <span class="member-badge">Thành viên</span>
          <span class="user-display-name" *ngIf="!user()" style="font-size: 0.8rem; font-weight: normal;">Đang
            tải...</span>
          <span class="user-display-name" *ngIf="user()">{{ user()?.fullName || user()?.name || user()?.username
            }}</span>
        </div>
        <button class="logout-icon-btn" (click)="logout()" title="Đăng xuất">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>

      <ng-template #loginParams>
        <a routerLink="/login" class="action-btn login-btn">
          <span>Đăng nhập</span>
        </a>
      </ng-template>

    </div>
  </div>
</header>
