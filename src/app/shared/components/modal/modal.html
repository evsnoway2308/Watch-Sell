<div class="modal-overlay" *ngIf="modalService.isOpen()" (click)="onCancel()">
    <div class="modal-container" (click)="$event.stopPropagation()"
        [ngClass]="modalService.config()?.variant || 'primary'">
        <!-- Modal Icon Block -->
        <div class="modal-icon-wrapper" *ngIf="modalService.config()?.icon || modalService.config()?.variant">
            <div class="icon-circle">
                <i [class]="modalService.config()?.icon || getDefaultIcon()"></i>
            </div>
        </div>

        <!-- Modal Content -->
        <div class="modal-content-wrapper">
            <div class="modal-header">
                <h3 class="modal-title">{{ modalService.config()?.title }}</h3>
                <button class="btn-close" (click)="onCancel()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="modal-body">
                <p class="modal-message">{{ modalService.config()?.message }}</p>
            </div>

            <div class="modal-footer">
                <button *ngIf="modalService.config()?.type === 'confirm'" class="btn-cancel" (click)="onCancel()">
                    {{ modalService.config()?.cancelText }}
                </button>
                <button class="btn-confirm" (click)="onConfirm()">
                    {{ modalService.config()?.confirmText }}
                </button>
            </div>
        </div>
    </div>
</div>
